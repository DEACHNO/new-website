name: Deploy To Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Upload Deploy Script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "scripts/deploy.sh"
          target: "/tmp/new-website-deploy"

      - name: Run Remote Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            chmod +x /tmp/new-website-deploy/scripts/deploy.sh
            export APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            export APP_BRANCH="${{ secrets.SERVER_APP_BRANCH }}"
            /tmp/new-website-deploy/scripts/deploy.sh
