server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/notices {
        default_type application/json;
        try_files /data/notices.json =404;
    }

    location = /api/site-assets {
        default_type application/json;
        try_files /data/site-assets.json =404;
    }

    location /downloads/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location /media/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
