server {
    listen 80;
    server_name newhappy-cn.net www.newhappy-cn.net;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name newhappy-cn.net www.newhappy-cn.net;

    ssl_certificate /etc/letsencrypt/live/newhappy-cn.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newhappy-cn.net/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    location = /api/notices {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /data/notices.json =404;
    }

    location = /api/site-assets {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /data/site-assets.json =404;
    }

    location /downloads/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location /media/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location ~* \.(css|js)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
